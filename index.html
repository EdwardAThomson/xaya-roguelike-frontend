<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xaya Roguelike</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="topbar">
    <span class="topbar-label">GSP</span>
    <input id="gsp-url" type="text" value="http://localhost:18332" spellcheck="false">
    <span class="topbar-label">Player</span>
    <input id="player-name" type="text" placeholder="name" spellcheck="false">
    <button id="connect-btn">Connect</button>
    <span id="connection-status" class="status-disconnected">Disconnected</span>
    <div class="topbar-spacer"></div>
    <button id="mode-overworld" class="mode-btn active" disabled>Overworld</button>
    <button id="mode-dungeon" class="mode-btn">Dungeon</button>
  </div>
  <div id="app">
    <div id="game-area">
      <canvas id="game-canvas"></canvas>
    </div>
    <div id="sidebar">
      <div id="stats-panel" class="panel">
        <h3>Player</h3>
        <div id="stats-display"></div>
      </div>
      <div id="inventory-panel" class="panel">
        <h3>Inventory</h3>
        <div id="inventory-display"></div>
      </div>
      <div id="message-panel" class="panel">
        <h3>Messages</h3>
        <div id="message-log"></div>
      </div>
    </div>
  </div>
  <script type="module" src="dist/main.js"></script>
</body>
</html>
